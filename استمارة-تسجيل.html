<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>استمارة التسجيل — الدليل الشامل لإدارة المقابلات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #e8f0fe 0%, #f0f4f8 50%, #dbeafe 100%);
    z-index: 0;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    background: #ffffff;
    border: 1px solid #c7d8f5;
    border-radius: 20px;
    width: 100%;
    max-width: 540px;
    padding: 40px 36px 48px;
    box-shadow: 0 4px 30px rgba(59,130,246,0.1), 0 1px 4px rgba(0,0,0,0.06);
  }

  /* header */
  .header { text-align: center; margin-bottom: 36px; }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 5px 18px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .title {
    font-size: 20px;
    font-weight: 900;
    line-height: 1.5;
    color: #1e293b;
  }
  .title span {
    color: #2563eb;
  }

  .collab {
    margin-top: 8px;
    font-size: 12px;
    color: #2563eb;
    font-weight: 600;
  }

  .meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #64748b;
    font-weight: 600;
  }
  .meta-item svg { width: 14px; height: 14px; fill: #3b82f6; flex-shrink: 0; }

  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, #3b82f6, transparent);
    margin: 20px auto 0;
  }

  /* form */
  .form { display: flex; flex-direction: column; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 7px; }

  label {
    font-size: 13px;
    font-weight: 700;
    color: #334155;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  label .icon { font-size: 15px; }

  input, select {
    background: #f8fafc;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    color: #1e293b;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }
  input::placeholder { color: #94a3b8; }
  input:focus, select:focus {
    border-color: #3b82f6;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  select option { background: #fff; color: #1e293b; }

  .select-wrapper { position: relative; }
  .select-wrapper::after {
    content: '▾';
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: #3b82f6;
    font-size: 14px;
    pointer-events: none;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* submit */
  .btn-wrap { margin-top: 8px; }
  button[type="submit"] {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(59,130,246,0.35);
    letter-spacing: 0.5px;
  }
  button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(59,130,246,0.45);
  }
  button[type="submit"]:active { transform: translateY(0); }

  /* success */
  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px 0 10px;
    gap: 14px;
  }
  .success-icon {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 30px rgba(59,130,246,0.3);
  }
  .success h3 { font-size: 22px; font-weight: 900; color: #1e293b; }
  .success p { font-size: 14px; color: #64748b; line-height: 1.7; }

  /* entries table */
  .entries-section {
    position: relative; z-index: 1;
    margin-top: 40px;
    width: 100%; max-width: 750px;
  }
  .entries-title {
    color: #2563eb;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .entries-table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    background: #fff;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: #eff6ff;
    color: #1d4ed8;
    font-weight: 700;
    padding: 10px 14px;
    text-align: right;
    white-space: nowrap;
  }
  td {
    color: #334155;
    padding: 9px 14px;
    border-top: 1px solid #f1f5f9;
    white-space: nowrap;
  }
  tr:hover td { background: #f8faff; }

  .clear-btn {
    display: block;
    margin: 12px auto 0;
    background: transparent;
    border: 1px solid #cbd5e1;
    color: #64748b;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    padding: 6px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: #ef4444; color: #ef4444; }

  @media (max-width: 480px) {
    .card { padding: 28px 20px 36px; }
    .title { font-size: 17px; }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="badge">مبادرة قانوني بللساني</div>
    <div class="title"><span>الدليل الشامل</span> لإدارة المقابلات<br/>وصناعة السرد الودي في البودكاست المرئي</div>
    <p class="collab">✦ بالتعاون مع نادي قانوني بللساني ✦</p>
    <div class="meta">
      <div class="meta-item">
        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 16H5V9h14v11z"/></svg>
        23 جوان 2026
      </div>
      <div class="meta-item">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
        دار الشباب الاخوة، باربار
      </div>
    </div>
    <div class="divider"></div>
  </div>

  <div id="formWrapper">
    <form class="form" id="regForm" novalidate>

      <div class="field">
        <label><span class="icon">👤</span> الاسم الكامل</label>
        <input type="text" id="name" placeholder="أدخل اسمك الكامل" required />
      </div>

      <div class="row">
        <div class="field">
          <label><span class="icon">🎂</span> السن</label>
          <input type="number" id="age" placeholder="مثال: 24" min="10" max="99" required />
        </div>
        <div class="field">
          <label><span class="icon">📞</span> رقم الهاتف</label>
          <input type="tel" id="phone" placeholder="0555..." required />
        </div>
      </div>

      <div class="field">
        <label><span class="icon">✉️</span> البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com" required />
      </div>

      <div class="field">
        <label><span class="icon">📍</span> الولاية</label>
        <div class="select-wrapper">
          <select id="wilaya" required>
            <option value="" disabled selected>اختر ولايتك</option>
            <option>أدرار</option><option>الشلف</option><option>الأغواط</option>
            <option>أم البواقي</option><option>باتنة</option><option>بجاية</option>
            <option>بسكرة</option><option>بشار</option><option>البليدة</option>
            <option>البويرة</option><option>تمنراست</option><option>تبسة</option>
            <option>تلمسان</option><option>تيارت</option><option>تيزي وزو</option>
            <option>الجزائر</option><option>الجلفة</option><option>جيجل</option>
            <option>سطيف</option><option>سعيدة</option><option>سكيكدة</option>
            <option>سيدي بلعباس</option><option>عنابة</option><option>قالمة</option>
            <option>قسنطينة</option><option>المدية</option><option>مستغانم</option>
            <option>المسيلة</option><option>معسكر</option><option>ورقلة</option>
            <option>وهران</option><option>البيض</option><option>إليزي</option>
            <option>برج بوعريريج</option><option>بومرداس</option><option>الطارف</option>
            <option>تندوف</option><option>تيسمسيلت</option><option>الوادي</option>
            <option>خنشلة</option><option>سوق أهراس</option><option>تيبازة</option>
            <option>ميلة</option><option>عين الدفلى</option><option>النعامة</option>
            <option>عين تموشنت</option><option>غرداية</option><option>غليزان</option>
            <option>تيميمون</option><option>برج باجي مختار</option><option>أولاد جلال</option>
            <option>بني عباس</option><option>عين صالح</option><option>عين قزام</option>
            <option>توقرت</option><option>جانت</option><option>المغير</option><option>المنيعة</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label><span class="icon">🎓</span> التخصص أو المجال</label>
        <input type="text" id="specialty" placeholder="مثال: قانون، صحافة، تصوير، إعلام..." required />
      </div>

      <div class="btn-wrap">
        <button type="submit">📩 تسجيل الآن</button>
      </div>

    </form>
  </div>

  <div class="success" id="successMsg">
    <div class="success-icon">✓</div>
    <h3>تم تسجيلك بنجاح!</h3>
    <p>شكراً لك، سيتم التواصل معك قريباً.<br/>في انتظارك يوم 23 جوان 🎙️</p>
  </div>
</div>



<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby7yRmmE7pqvkaezzYzXW0ixf5saYYoVoWLVUOGu-VyObDD1vvdAoS7WnTTsNg6_znL/exec';

  document.getElementById('regForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const get = id => document.getElementById(id).value.trim();
    const name      = get('name');
    const age       = get('age');
    const phone     = get('phone');
    const email     = get('email');
    const wilaya    = get('wilaya');
    const specialty = get('specialty');

    if (!name || !age || !phone || !email || !wilaya || !specialty) {
      alert('يرجى ملء جميع الحقول'); return;
    }
    if (isNaN(age) || age < 10 || age > 99) {
      alert('يرجى إدخال سن صحيح'); return;
    }

    // show loading
    const btn = document.querySelector('button[type="submit"]');
    btn.textContent = '⏳ جاري الإرسال...';
    btn.disabled = true;

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, age, phone, email, wilaya, specialty })
      });

      document.getElementById('formWrapper').style.display = 'none';
      document.getElementById('successMsg').style.display = 'flex';
    } catch (err) {
      alert('حدث خطأ، حاولي مرة أخرى');
      btn.textContent = '📩 تسجيل الآن';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
